          - paragraph [ref=e134]: We evaluate your top 3-5 most time-consuming processes end-to-end. Not surface-level observations — we document every step, every tool, every handoff, every pain point, and every error. You’ll see exactly where hours disappear, where errors compound, and where money leaks out of your operation.
